<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bushmans Cookbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth, un-clipped accordion transition */
        .checklist-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .checklist-content.expanded {
            max-height: 4000px; /* Massive headroom so long ingredient lists never clip */
        }
        ::-webkit-scrollbar { display: none; }
        
        input[type="checkbox"] {
            accent-color: #047857;
            width: 1.4rem;
            height: 1.4rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-zinc-100 text-zinc-800 font-sans h-screen flex justify-center selection:bg-emerald-200">

    <!-- Mobile App Frame -->
    <div class="w-full max-w-md bg-white h-full shadow-2xl flex flex-col relative overflow-hidden sm:rounded-[2rem] sm:h-[94vh] sm:mt-6 border border-zinc-200/80">
        
        <!-- Premium Static Header -->
        <header class="bg-gradient-to-b from-emerald-900 to-emerald-800 text-white px-5 py-4 shadow-md flex justify-between items-center z-10 border-b border-emerald-700/50">
            <button id="backBtn" class="hidden bg-emerald-950/40 hover:bg-emerald-950/70 border border-emerald-600/40 text-emerald-100 px-3.5 py-1.5 rounded-xl text-xs font-bold tracking-wider uppercase transition-all active:scale-95" onclick="showListView()">
                Back
            </button>
            <h1 class="text-xl font-black tracking-tight text-center flex-1 drop-shadow-sm">Bushmans Cookbook</h1>
            <div id="rightSpacer" class="hidden w-[53px]"></div> <!-- Counter-balances the Back button width for dead-center title -->
        </header>

        <!-- View 1: Vault List -->
        <main id="listView" class="flex-1 overflow-y-auto p-5 bg-zinc-50/50">
            <div class="flex justify-between items-baseline mb-4 px-1">
                <span class="text-[11px] font-black tracking-widest uppercase text-zinc-400">Saved Recipes</span>
                <span class="text-[11px] font-bold text-emerald-700" id="recipeCount">Syncing...</span>
            </div>
            <div id="recipeCards" class="flex flex-col space-y-3.5"></div>
        </main>

        <!-- View 2: Recipe Reader -->
        <main id="recipeView" class="hidden flex-1 overflow-y-auto bg-white"></main>

    </div>

    <script>
        let recipes = []; 
        const EXPIRY_TIME_MS = 7 * 24 * 60 * 60 * 1000;

        // PRE-LINKED TO YOUR GITHUB REPO
        const GITHUB_USERNAME = "bushmann24"; 
        const GITHUB_REPO = "bushmans-cookbook";

        const listView = document.getElementById('listView');
        const recipeView = document.getElementById('recipeView');
        const backBtn = document.getElementById('backBtn');
        const rightSpacer = document.getElementById('rightSpacer');
        const recipeCards = document.getElementById('recipeCards');
        const recipeCount = document.getElementById('recipeCount');

        async function loadRecipesFromFolder() {
            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/recipes`;
                const folderResponse = await fetch(apiUrl);
                
                if (!folderResponse.ok) throw new Error("GitHub API unreachable");
                const folderContents = await folderResponse.json();

                for (const file of folderContents) {
                    if (file.name.endsWith('.json')) {
                        const res = await fetch(file.download_url);
                        const recipeData = await res.json();
                        recipes.push(recipeData);
                    }
                }
                renderList();
            } catch (error) {
                console.error(error);
                recipeCount.innerText = "Offline";
                recipeCards.innerHTML = `
                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-200 text-amber-900 text-sm">
                        <p class="font-bold mb-1">Could not reach GitHub</p>
                        <p class="text-xs text-amber-700">Ensure your repo is set to Public so the app can fetch your files.</p>
                    </div>`;
            }
        }

        function renderList() {
            recipeCards.innerHTML = '';
            recipeCount.innerText = `${recipes.length} Dishes`;

            recipes.forEach(recipe => {
                const tagPills = recipe.tags.map(tag => 
                    `<span class="bg-zinc-100 text-zinc-600 font-semibold text-[11px] px-2.5 py-1 rounded-md">${tag}</span>`
                ).join('');

                const card = document.createElement('div');
                card.className = "bg-white border border-zinc-200/70 p-5 rounded-2xl shadow-sm hover:border-emerald-500/40 active:scale-[0.98] transition-all cursor-pointer";
                card.onclick = () => showRecipe(recipe);
                card.innerHTML = `
                    <h2 class="text-lg font-extrabold text-zinc-900 mb-2.5 leading-snug">${recipe.title}</h2>
                    <div class="flex flex-wrap gap-1.5">${tagPills}</div>
                `;
                recipeCards.appendChild(card);
            });
        }

        function showRecipe(recipe) {
            listView.classList.add('hidden');
            recipeView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            rightSpacer.classList.remove('hidden');
            recipeView.scrollTop = 0; // Snap to top

            // Check 7-day memory
            let savedChecks = [];
            const savedData = localStorage.getItem(`bushmans_${recipe.id}`);
            if (savedData) {
                const parsed = JSON.parse(savedData);
                if (Date.now() - parsed.timestamp > EXPIRY_TIME_MS) {
                    localStorage.removeItem(`bushmans_${recipe.id}`);
                } else {
                    savedChecks = parsed.checkedItems;
                }
            }

            // 1. Plain text Ingredients
            const plainIngHtml = recipe.ingredients.map(i => 
                `<li class="text-zinc-700 text-sm py-1 border-b border-zinc-100 last:border-none leading-relaxed">${i}</li>`
            ).join('');

            // 2. Method Steps
            const stepHtml = recipe.instructions.map((step, idx) => `
                <div class="flex items-start mb-5 leading-relaxed">
                    <span class="flex-shrink-0 bg-emerald-100 text-emerald-900 font-black text-xs w-6 h-6 rounded-lg flex items-center justify-center mr-3 mt-0.5">${idx + 1}</span>
                    <p class="text-zinc-700 text-[15px] pt-0.5">${step}</p>
                </div>
            `).join('');

            // 3. Interactive Checklist
            const checkHtml = recipe.ingredients.map((ing, idx) => {
                const isChecked = savedChecks.includes(idx) ? 'checked' : '';
                const textStyle = isChecked ? 'text-zinc-300 line-through' : 'text-zinc-700 font-medium';
                
                return `
                <label class="flex items-center space-x-3.5 py-3.5 px-4 hover:bg-zinc-50 border-b border-zinc-100 cursor-pointer select-none transition-colors">
                    <input type="checkbox" onchange="saveChecklist('${recipe.id}')" data-idx="${idx}" ${isChecked} class="ingredient-cb rounded border-zinc-300">
                    <span class="text-sm ${textStyle}" id="lbl-${recipe.id}-${idx}">${ing}</span>
                </label>
            `}).join('');

            // 4. Tags Applied
            const tagsHtml = recipe.tags.map(t => 
                `<span class="bg-zinc-100 text-zinc-500 font-bold text-[10px] tracking-wider uppercase px-2.5 py-1 rounded border border-zinc-200/60">${t}</span>`
            ).join('');

            recipeView.innerHTML = `
                <div class="p-6 pb-16 max-w-lg mx-auto">
                    
                    <h2 class="text-2xl sm:text-3xl font-black text-zinc-900 tracking-tight mb-6">${recipe.title}</h2>

                    <!-- Block 1: Standard Ingredients List -->
                    <div class="mb-8 bg-zinc-50 border border-zinc-200/60 rounded-2xl p-5 shadow-inner">
                        <h3 class="text-[11px] font-black tracking-widest uppercase text-emerald-800 mb-3">Ingredients</h3>
                        <ul class="list-none pl-0">
                            ${plainIngHtml}
                        </ul>
                    </div>

                    <!-- Block 2: Method -->
                    <div class="mb-10">
                        <h3 class="text-[11px] font-black tracking-widest uppercase text-zinc-400 mb-5 border-b border-zinc-100 pb-2">Method</h3>
                        <div class="flex flex-col">
                            ${stepHtml}
                        </div>
                    </div>

                    <!-- Block 3: Expandable Checklist Tool -->
                    <div class="mb-10 rounded-2xl border border-emerald-900/10 shadow-lg overflow-hidden bg-white">
                        <button onclick="toggleChecklist()" class="w-full p-4 bg-emerald-900 hover:bg-emerald-850 text-white flex justify-between items-center transition-colors">
                            <span class="font-extrabold text-sm tracking-wide flex items-center">
                                <span class="mr-2.5 text-base">🛒</span> SHOPPING CHECKLIST
                            </span>
                            <span id="expandIcon" class="text-xl font-light transform transition-transform duration-300">+</span>
                        </button>
                        <div id="checklistContent" class="checklist-content">
                            <div class="flex flex-col border-t border-zinc-100">
                                ${checkHtml}
                            </div>
                        </div>
                    </div>

                    <!-- Block 4: Filters Footer -->
                    <div class="pt-6 border-t border-zinc-100">
                        <span class="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2.5">Tagged Under</span>
                        <div class="flex flex-wrap gap-1.5">
                            ${tagsHtml}
                        </div>
                    </div>

                </div>
            `;
        }

        function saveChecklist(recipeId) {
            const checkboxes = document.querySelectorAll('.ingredient-cb');
            const checkedIndexes = [];
            
            checkboxes.forEach(cb => {
                const idx = cb.getAttribute('data-idx');
                const label = document.getElementById(`lbl-${recipeId}-${idx}`);
                
                if (cb.checked) {
                    checkedIndexes.push(parseInt(idx));
                    label.className = "text-sm text-zinc-300 line-through transition-all";
                } else {
                    label.className = "text-sm text-zinc-700 font-medium transition-all";
                }
            });

            localStorage.setItem(`bushmans_${recipeId}`, JSON.stringify({
                checkedItems: checkedIndexes,
                timestamp: Date.now()
            }));
        }

        function showListView() {
            recipeView.classList.add('hidden');
            listView.classList.remove('hidden');
            backBtn.classList.add('hidden');
            rightSpacer.classList.add('hidden');
        }

        function toggleChecklist() {
            const content = document.getElementById('checklistContent');
            const icon = document.getElementById('expandIcon');
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('expanded');
                icon.style.transform = 'rotate(45deg)';
            }
        }

        loadRecipesFromFolder();
    </script>
</body>
</html>
