<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recipe Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transition for the expanding checklist */
        .checklist-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .checklist-content.expanded {
            max-height: 500px; /* Arbitrary large height to allow expansion */
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex justify-center">

    <div class="w-full max-w-md bg-white h-full shadow-2xl flex flex-col relative overflow-hidden">
        
        <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center z-10">
            <button id="backBtn" class="hidden text-white hover:bg-indigo-500 p-2 rounded-lg font-bold" onclick="showListView()">
                ← Back
            </button>
            <h1 class="text-xl font-bold tracking-wide" id="appTitle">My Recipes</h1>
            <div class="w-8"></div> </header>

        <main id="listView" class="flex-1 overflow-y-auto p-4 bg-gray-50">
            <p class="text-sm text-gray-500 mb-4 font-semibold uppercase tracking-wider">Tap a recipe to cook</p>
            <div id="recipeCards" class="flex flex-col space-y-3">
                </div>
        </main>

        <main id="recipeView" class="hidden flex-1 overflow-y-auto p-5 bg-white pb-20">
            </main>

    </div>

    <script>
        // THIS IS HOW YOUR INDIVIDUAL GITHUB FILES WILL BE STRUCTURED LATER
        const recipes = [
            {
                id: "creamy-chicken-pasta",
                title: "Creamy Chicken Pasta",
                tags: ["Chicken", "Pasta", "Dinner", "30 Mins"],
                ingredients: [
                    "2 Chicken Breasts", 
                    "500g Penne Pasta", 
                    "1 Cup Thick Cream", 
                    "Garlic Powder", 
                    "Parmesan Cheese"
                ],
                instructions: [
                    "Boil water and cook the penne pasta until al dente.",
                    "Dice the chicken breasts and pan-fry with olive oil and garlic powder.",
                    "Pour in the thick cream and let it simmer for 5 minutes.",
                    "Mix in the drained pasta and top heavily with parmesan cheese."
                ]
            },
            {
                id: "honey-soy-beef",
                title: "Honey Soy Beef Stir-fry",
                tags: ["Beef", "Quick", "Asian-Inspired"],
                ingredients: [
                    "500g Beef Strips", 
                    "Broccoli", 
                    "Soy Sauce", 
                    "Honey", 
                    "Microwave Rice"
                ],
                instructions: [
                    "Mix equal parts soy sauce and honey in a small bowl.",
                    "Flash fry the beef strips in a hot wok until browned.",
                    "Toss in the chopped broccoli and pour over the sauce.",
                    "Serve immediately over heated microwave rice."
                ]
            }
        ];

        // DOM Elements
        const listView = document.getElementById('listView');
        const recipeView = document.getElementById('recipeView');
        const backBtn = document.getElementById('backBtn');
        const appTitle = document.getElementById('appTitle');
        const recipeCards = document.getElementById('recipeCards');

        // Render the Home Screen List
        function renderList() {
            recipeCards.innerHTML = '';
            recipes.forEach(recipe => {
                // Create pill badges for tags
                const tagPills = recipe.tags.map(tag => 
                    `<span class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2 py-1 rounded-full">${tag}</span>`
                ).join(' ');

                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 p-4 rounded-xl shadow-sm active:scale-95 transition-transform cursor-pointer";
                card.onclick = () => showRecipe(recipe);
                card.innerHTML = `
                    <h2 class="text-lg font-bold text-gray-900 mb-2">${recipe.title}</h2>
                    <div class="flex flex-wrap gap-1">${tagPills}</div>
                `;
                recipeCards.appendChild(card);
            });
        }

        // Render the Single Recipe Screen
        function showRecipe(recipe) {
            listView.classList.add('hidden');
            recipeView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            appTitle.innerText = "Cooking Mode";

            // Format Instructions
            const stepHtml = recipe.instructions.map((step, idx) => `
                <li class="mb-3 flex text-gray-700 leading-relaxed">
                    <span class="font-bold text-indigo-500 mr-3">${idx + 1}.</span>
                    <span>${step}</span>
                </li>
            `).join('');

            // Format Interactive Checklist
            const checkHtml = recipe.ingredients.map((ing, idx) => `
                <label class="flex items-center space-x-3 p-3 hover:bg-gray-50 border-b border-gray-100 cursor-pointer">
                    <input type="checkbox" class="w-6 h-6 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
                    <span class="text-gray-700 text-lg">${ing}</span>
                </label>
            `).join('');

            // Format Tags for the bottom
            const bottomTags = recipe.tags.map(tag => 
                `<span class="bg-gray-100 text-gray-600 text-sm font-medium px-3 py-1.5 rounded-md border border-gray-200">${tag}</span>`
            ).join(' ');

            // Inject the layout exactly as you requested
            recipeView.innerHTML = `
                <h2 class="text-3xl font-extrabold text-gray-900 mb-6">${recipe.title}</h2>

                <div class="mb-8">
                    <h3 class="text-xl font-bold text-gray-800 mb-3 border-b pb-2">Ingredients</h3>
                    <ul class="list-disc pl-5 text-gray-700 space-y-1">
                        ${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}
                    </ul>
                </div>

                <div class="mb-10">
                    <h3 class="text-xl font-bold text-gray-800 mb-3 border-b pb-2">Instructions</h3>
                    <ul class="list-none pl-0">
                        ${stepHtml}
                    </ul>
                </div>

                <div class="mb-10 bg-indigo-50 rounded-xl border border-indigo-100 overflow-hidden shadow-sm">
                    <button onclick="toggleChecklist()" class="w-full p-4 flex justify-between items-center bg-indigo-100 text-indigo-900 font-bold text-lg focus:outline-none">
                        <span>🛒 Ingredient Checklist</span>
                        <span id="expandIcon" class="text-2xl transition-transform duration-200">+</span>
                    </button>
                    <div id="checklistContent" class="checklist-content bg-white">
                        <div class="p-2 flex flex-col">
                            <p class="text-xs text-center text-gray-500 py-2 uppercase font-bold tracking-wide">Check off what you have!</p>
                            ${checkHtml}
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Tags Applied</h3>
                    <div class="flex flex-wrap gap-2">
                        ${bottomTags}
                    </div>
                </div>
            `;
        }

        // Handle navigation back to list
        function showListView() {
            recipeView.classList.add('hidden');
            listView.classList.remove('hidden');
            backBtn.classList.add('hidden');
            appTitle.innerText = "My Recipes";
        }

        // Handle the expanding checklist animation
        function toggleChecklist() {
            const content = document.getElementById('checklistContent');
            const icon = document.getElementById('expandIcon');
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('expanded');
                icon.style.transform = 'rotate(45deg)'; // Turns the + into an x
            }
        }

        // Initialize App
        renderList();
    </script>
</body>
</html>
